<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Awning -->
  <rect x="8" y="14" width="48" height="10" rx="1" fill="#8b7e6a"/>
  <rect x="8" y="14" width="48" height="3" fill="#a0937e"/>
  <!-- Awning stripes -->
  <line x1="16" y1="14" x2="16" y2="24" stroke="#7a6e5c" stroke-width="2"/>
  <line x1="24" y1="14" x2="24" y2="24" stroke="#7a6e5c" stroke-width="2"/>
  <line x1="32" y1="14" x2="32" y2="24" stroke="#7a6e5c" stroke-width="2"/>
  <line x1="40" y1="14" x2="40" y2="24" stroke="#7a6e5c" stroke-width="2"/>
  <line x1="48" y1="14" x2="48" y2="24" stroke="#7a6e5c" stroke-width="2"/>
  <!-- Shop body -->
  <rect x="14" y="23" width="36" height="32" fill="#f5f1ea" stroke="#8b7e6a" stroke-width="2"/>
  <!-- Door -->
  <rect x="26" y="36" width="12" height="18" rx="6" fill="#8b7e6a"/>
  <circle cx="35" cy="46" r="1.5" fill="#f5f1ea"/>
  <!-- Windows -->
  <rect x="16" y="27" width="8" height="8" rx="1" fill="#d4cdbe" stroke="#8b7e6a" stroke-width="1"/>
  <rect x="40" y="27" width="8" height="8" rx="1" fill="#d4cdbe" stroke="#8b7e6a" stroke-width="1"/>
  <!-- Counter -->
  <rect x="12" y="56" width="40" height="4" rx="2" fill="#8b7e6a"/>
</svg>

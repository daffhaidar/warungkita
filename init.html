<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#8b7e6a">
<meta http-equiv="refresh" content="1;url=./">
<title>WarungKita - Setup</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#FDFBF7;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:24px}
.box{text-align:center;max-width:320px}
.spinner{width:32px;height:32px;border:3px solid #e8e3d9;border-top-color:#8b7e6a;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:18px;color:#1a1814;margin-bottom:8px}
p{font-size:14px;color:#7a7468;line-height:1.5}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h1>Memulai WarungKita...</h1>
  <p id="msg">Menyiapkan kunci akses lokal</p>
</div>
<script>
(async()=>{
  try{
    const r=await fetch('/api/init');
    if(r.ok){
      const d=await r.json();
      // Public init returns masked key only. We can't use masked for API calls.
      // Bootstrap relies on the admin-token URL (set by operator once, then user has key in localStorage).
      // On first load we check URL for ?t=admin token. If present, store full key.
    }
    const url=new URL(location.href);
    const t=url.searchParams.get('t');
    if(t){
      const r2=await fetch('/api/init?t='+encodeURIComponent(t));
      if(r2.ok){
        const d2=await r2.json();
        if(d2.api_key && !d2.masked){
          localStorage.setItem('warungkita_api_key',d2.api_key);
          localStorage.setItem('warungkita_admin_token',t);
        }
      }
    }
  }catch(e){}
  location.replace('./');
})();
</script>
</body>
</html>
